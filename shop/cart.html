<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Seng Seng</title>
  <link rel="stylesheet" href="css/store.css">
</head>
<body>
  <nav>
     <a href="index.html" class="logo">Seng Seng</a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none">0</span></a>
    </div>
  </nav>

  <div class="cart-container">
    <h1>Your Cart</h1>
    <div class="empty-cart" id="empty-cart">
      <p>Your cart is empty</p>
      <a href="index.html#products" class="btn btn-primary">Continue Shopping</a>
    </div>
    <div id="cart-items"></div>
    <div class="cart-summary" id="cart-summary" style="display:none">
      <div class="total">Total: <span id="cart-total">₱0.00</span></div>
      <div id="checkout-btns" style="display:none">
        <a href="checkout.html" class="btn btn-primary">Checkout</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="logo">Seng Seng</div>
    <p>&copy; 2026 Seng Seng. All rights reserved.</p>
  </footer>

  <script src="js/store.js"></script>
</body>
</html>
