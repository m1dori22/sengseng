<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Seng Seng</title>
  <link rel="stylesheet" href="css/store.css">
</head>
<body>
  <nav>
     <a href="index.html" class="logo">Seng Seng</a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none">0</span></a>
    </div>
  </nav>

  <div class="checkout-form">
    <h1>Checkout</h1>
    <form id="checkout-form">
      <h3 style="margin-bottom:1rem;color:var(--charcoal)">Shipping Info</h3>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" required></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" required></div>
      <div class="form-group"><label>Address</label><input type="text" required></div>
      <div class="form-row">
        <div class="form-group">
          <label>Country</label>
          <select id="country" required>
            <option value="US">United States</option>
            <option value="PH">Philippines</option>
          </select>
        </div>
        <div class="form-group"><label>City</label><input type="text" id="city" required></div>
        <div class="form-group"><label>State / Province</label><input type="text" id="state" required></div>
        <div class="form-group"><label>ZIP / Postal Code</label><input type="text" id="zip" placeholder="Enter ZIP" required></div>
      </div>

      <h3 style="margin:2rem 0 1rem;color:var(--charcoal)">Payment</h3>
      <div class="form-group"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456" required></div>
      <div class="form-row">
        <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM/YY" required></div>
        <div class="form-group"><label>CVV</label><input type="text" placeholder="123" required></div>
      </div>

      <div class="order-summary" id="order-summary"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1.5rem;padding:1rem">Place Order</button>
    </form>
  </div>

  <footer>
    <div class="logo">Seng Seng</div>
    <p>&copy; 2026 Seng Seng. All rights reserved.</p>
  </footer>

  <script src="js/store.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cart = getCart();
      const summary = document.getElementById("order-summary");
      if (cart.length === 0) { window.location.href = "../index.html"; return; }
      let total = 0;
      summary.innerHTML = "<h3 style='margin-bottom:1rem;color:var(--charcoal)'>Order Summary</h3>" +
        cart.map(item => {
          const p = PRODUCTS.find(x => x.id === item.id);
          const lineTotal = p.price * item.qty;
          total += lineTotal;
          return `<div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>${p.name} x${item.qty}</span><span>₱${lineTotal.toFixed(2)}</span></div>`;
        }).join("") +
        `<div style="border-top:1px solid #ddd;padding-top:0.5rem;margin-top:0.5rem;font-weight:bold;display:flex;justify-content:space-between"><span>Total</span><span>₱${total.toFixed(2)}</span></div>`;
    });

    document.getElementById("checkout-form").addEventListener("submit", (e) => {
      e.preventDefault();
      localStorage.removeItem("seng_cart");
      window.location.href = "success.html";
    });

    // ZIP autocomplete
    const zipInput = document.getElementById("zip");
    const cityInput = document.getElementById("city");
    const stateInput = document.getElementById("state");
    let zipTimer;
    zipInput.addEventListener("input", () => {
      clearTimeout(zipTimer);
      const zip = zipInput.value.replace(/\D/g, "");
      if (zip.length === 5) {
        zipTimer = setTimeout(() => {
          fetch(`https://zip.getziptastic.com/v2/US/${zip}`)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
              if (data) {
                cityInput.value = data.city || "";
                stateInput.value = data.state || "";
              }
            })
            .catch(() => {});
        }, 300);
      }
    });
  </script>
</body>
</html>
